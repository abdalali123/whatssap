# railway.toml — VexOS WhatsApp Microservice
[build]
builder        = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath         = "/health"
healthcheckTimeout      = 10

[[services]]
name = "whatsapp-service"

[[services.ports]]
port     = 3001
protocol = "TCP"
